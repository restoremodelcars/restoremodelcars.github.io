<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restore Model Cars</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    color: #111;
}

/* ================= HEADER ================= */
header {
    background: #0d0d0d;
    color: white;
    padding: 20px 0;
    text-align: center;
    border-bottom: 3px solid #dc2626;
}

header h1 {
    font-size: 2rem;
}

/* ================= CONTAINER ================= */
.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* ================= SECTION ================= */
.section {
    padding: 80px 0;
}

.title {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 50px;
}

.title::after {
    content: "";
    display: block;
    width: 60px;
    height: 3px;
    background: #dc2626;
    margin: 12px auto;
}

/* ================= PROJECT ================= */
.project {
    margin-bottom: 80px;
}

.project h3 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 10px;
}

.project p {
    text-align: center;
    color: #666;
    margin-bottom: 25px;
}

/* ================= GALLERY ================= */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.gallery img:hover {
    transform: scale(1.04);
}

/* ================= FOOTER ================= */
footer {
    background: #0d0d0d;
    color: white;
    text-align: center;
    padding: 30px 0;
    border-top: 3px solid #dc2626;
}

</style>

</head>

<body>

<header>
    <h1>Restore Model Cars</h1>
</header>

<section class="section">

<div class="container">

    <h2 class="title">Restaurations</h2>

    <!-- ================= PROJET 1 ================= -->
    <div class="project">
        <h3>Ferrari 250 GTO</h3>
        <p>Restauration complète - état concours</p>

        <div class="gallery">
            <img src="img/ferrari1.jpg" alt="">
            <img src="img/ferrari2.jpg" alt="">
            <img src="img/ferrari3.jpg" alt="">
            <img src="img/ferrari4.jpg" alt="">
        </div>
    </div>

    <!-- ================= PROJET 2 ================= -->
    <div class="project">
        <h3>Porsche 911 Classic</h3>
        <p>Remise à neuf détaillée</p>

        <div class="gallery">
            <img src="img/porsche1.jpg" alt="">
            <img src="img/porsche2.jpg" alt="">
            <img src="img/porsche3.jpg" alt="">
        </div>
    </div>

    <!-- ================= PROJET 3 ================= -->
    <div class="project">
        <h3>Mercedes 300 SL</h3>
        <p>Restauration carrosserie + intérieur</p>

        <div class="gallery">
            <img src="img/mercedes1.jpg" alt="">
            <img src="img/mercedes2.jpg" alt="">
            <img src="img/mercedes3.jpg" alt="">
            <img src="img/mercedes4.jpg" alt="">
        </div>
    </div>

</div>

</section>

<footer>
    <p>© 2026 Restore Model Cars</p>
</footer>

</body>
</html>
