<style>

/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #ffffff;
    color: #111;
}

/* ================= CONTAINER ================= */
.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* ================= HEADER ================= */

header {
    background: #0d0d0d;
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #dc2626;
}

.nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* LOGO */
.logo img {
    height: 85px;
}

/* MENU */
.menu {
    display: flex;
    list-style: none;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
}

.menu a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
    position: relative;
}

.menu a:hover {
    color: #dc2626;
}

/* underline animation */
.menu a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: #dc2626;
    transition: 0.3s;
}

.menu a:hover::after {
    width: 100%;
}

/* SOCIAL */
.social {
    display: flex;
    gap: 15px;
}

.social a {
    color: white;
    font-size: 1.2rem;
    transition: 0.3s;
}

.social a:hover {
    transform: scale(1.2);
}

.fa-facebook-f:hover { color: #1877f2; }
.fa-youtube:hover { color: #ff0000; }

/* ================= HERO ================= */

.hero {
    height: 85vh;

    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("fantome_250gto.jpg");

    background-size: cover;
    background-position: center;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    color: white;
    border-bottom: 4px solid #dc2626;
}

.hero h1 {
    font-size: 3.2rem;
    font-weight: 700;
}

.hero p {
    margin-top: 20px;
    font-size: 1.2rem;
    max-width: 700px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 32px;
    background: #dc2626;
    color: white;
    text-decoration: none;
    font-weight: 600;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    background: #a31212;
}

/* ================= SECTIONS ================= */

.section {
    padding: 90px 0;
}

.title {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 50px;
}

.title::after {
    content: "";
    display: block;
    width: 70px;
    height: 3px;
    background: #dc2626;
    margin: 15px auto;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: #ffffff;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 25px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-8px);
    border-color: #dc2626;
}

/* CONTACT */
form {
    max-width: 650px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

input:focus, textarea:focus {
    border-color: #dc2626;
    outline: none;
}

/* FOOTER */
footer {
    background: #0d0d0d;
    color: white;
    text-align: center;
    padding: 30px 0;
    border-top: 2px solid #dc2626;
}

/* RESPONSIVE */
@media (max-width: 768px) {

    .hero h1 {
        font-size: 2.2rem;
    }

    .menu {
        gap: 15px;
    }

}
</style>
