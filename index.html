<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restore Model Cars</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    color: #111;
}

/* ================= HEADER LOGO ================= */
header {
    background: #0d0d0d;
    padding: 15px 0;
    text-align: center;
    border-bottom: 3px solid #dc2626;
}

header img {
    height: 80px;
}

/* ================= HERO BANNER ================= */
.hero {
    height: 45vh;
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("fantome_250gto.jpg");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 3rem;
}

.hero p {
    margin-top: 10px;
    opacity: 0.9;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 50px;
}

/* CARD */
.card-link {
    text-decoration: none;
    color: inherit;
}

.card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    border-color: #dc2626;
}
    
/* CONTACT */
form {
    max-width: 650px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

input:focus, textarea:focus {
    border-color: #dc2626;
    outline: none;
}


/* FOOTER */
footer {
    background: #0d0d0d;
    color: white;
    text-align: center;
    padding: 30px 0;
    margin-top: 80px;
    border-top: 3px solid #dc2626;
}

</style>

</head>

<body>

<!-- HEADER LOGO -->
<header>
    <img src="new_logo_rmc.png" alt="Restore Model Cars Logo">
</header>

<!-- HERO BANNIÈRE -->
<section class="hero">
    <div>
        <h1>Restore Model Cars</h1>
        <p>Donner une seconde vie aux miniatures automobiles</p>
    </div>
</section>

<!-- CONTENU -->
<div class="container">

    <div class="grid">

        <a href="restauration.html" class="card-link">
            <div class="card">
                <h2>Restaurations/Améliorations</h2>
                <p>Modèles restaurés, améliorés,détaillés entièrement</p>
            </div>
        </a>

        <a href="dioramas.html" class="card-link">
            <div class="card">
                <h2>Dioramas</h2>
                <p>Scènes miniatures réalistes</p>
            </div>
        </a>

        <a href="maquettes.html" class="card-link">
            <div class="card">
                <h2>Maquettes</h2>
                <p>Assemblage à toutes échelles</p>
            </div>
        </a>

    </div>

</div>
    <!-- CONTACT -->
<section id="contact" class="section">
<div class="container">
    <h2 class="title">Contact</h2>

    <form>
        <input type="text" placeholder="Nom">
        <input type="email" placeholder="Email">
        <textarea placeholder="Votre message"></textarea>
        <button class="btn">Envoyer</button>
    </form>
</div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Restore Model Cars</p>
</footer>

</body>
</html>
